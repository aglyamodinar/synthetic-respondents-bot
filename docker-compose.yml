services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: synthbot
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d synthbot"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  init-db:
    build:
      context: ..
      dockerfile: synthetic-respondents-bot/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/synthbot
      ASYNC_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/synthbot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
    command: python scripts/init_db.py
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: synthetic-respondents-bot/Dockerfile
    env_file:
      - .env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/synthbot
      ASYNC_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/synthbot
      REDIS_URL: redis://redis:6379/0
      REPORTS_DIR: /app/synthetic-respondents-bot/artifacts/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
    ports:
      - "${APP_PORT:-8001}:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - reports:/app/synthetic-respondents-bot/artifacts/reports
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: synthetic-respondents-bot/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/synthbot
      ASYNC_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/synthbot
      REDIS_URL: redis://redis:6379/0
      REPORTS_DIR: /app/synthetic-respondents-bot/artifacts/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
    command: celery -A app.workers.celery_app worker --loglevel=info
    volumes:
      - reports:/app/synthetic-respondents-bot/artifacts/reports
    restart: unless-stopped

  bot:
    build:
      context: ..
      dockerfile: synthetic-respondents-bot/Dockerfile
    env_file:
      - .env
    environment:
      BOT_RUN_MODE: polling
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/synthbot
      ASYNC_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/synthbot
      REDIS_URL: redis://redis:6379/0
      REPORTS_DIR: /app/synthetic-respondents-bot/artifacts/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
      api:
        condition: service_started
    command: python -m app.bot.runner
    profiles: ["polling"]
    volumes:
      - reports:/app/synthetic-respondents-bot/artifacts/reports
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  reports:
